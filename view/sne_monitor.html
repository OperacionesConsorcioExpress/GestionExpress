{% extends "components/layout.html" %}
{% block title %}Monitor SNE{% endblock %}

{% block head %}
<!-- Apache ECharts 5 -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
    :root {
        --mon-primary: #0a2f75;
        --mon-secondary: #1e40af;
        --mon-accent: #0d6efd;
        --mon-bg: #f4f7fb;
        --mon-surface: #ffffff;
        --mon-surface-soft: #f8fbff;
        --mon-border: #dbe4f1;
        --mon-text: #122033;
        --mon-text-soft: #64748b;
        --mon-shadow-sm: 0 10px 24px rgba(15, 23, 42, 0.06);
        --mon-shadow-md: 0 18px 42px rgba(15, 23, 42, 0.1);
        --mon-radius-lg: 20px;
        --mon-radius-md: 16px;
    }

    * {
        font-family: 'Century Gothic', Arial, sans-serif;
    }

    .mon-page {
        min-height: 100vh;
        padding: 0.9rem;
        background:
            radial-gradient(circle at top left, rgba(13, 110, 253, 0.12), transparent 28%),
            radial-gradient(circle at top right, rgba(14, 165, 233, 0.1), transparent 24%),
            linear-gradient(180deg, #f8fbff 0%, var(--mon-bg) 100%);
    }

    .mon-shell {
        display: grid;
        gap: 1rem;
    }

    .mon-hero {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1.15rem 1.3rem;
        border-radius: var(--mon-radius-lg);
        background: linear-gradient(135deg, #0a2f75 0%, #0d58cf 52%, #0ea5e9 100%);
        color: #fff;
        box-shadow: var(--mon-shadow-md);
    }

    .mon-hero::after {
        content: "";
        position: absolute;
        inset: auto -48px -52px auto;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0));
    }

    .mon-hero__content,
    .mon-hero__meta {
        position: relative;
        z-index: 1;
    }

    .mon-hero__badge {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.36rem 0.8rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.18);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .mon-hero__title {
        margin: 0.65rem 0 0.18rem;
        font-size: 1.45rem;
        font-weight: 800;
    }

    .mon-hero__subtitle {
        margin: 0;
        max-width: 700px;
        font-size: 0.86rem;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.88);
    }

    .mon-hero__meta {
        display: flex;
        align-items: stretch;
        gap: 0.75rem;
        margin-left: auto;
    }

    .mon-hero>div[style*="opacity:0.95"] {
        display: none !important;
    }

    .mon-hero-stat {
        min-width: 155px;
        padding: 0.9rem 1rem;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(12px);
    }

    .mon-hero-stat__label {
        margin: 0 0 0.24rem;
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.74);
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .mon-hero-stat__value {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.95rem;
        font-weight: 800;
    }

    .mon-stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 0.6rem;
        overflow: visible;
    }

    .mon-kpi-card {
        position: relative;
        overflow: visible;
        padding: 0.68rem 0.78rem;
        border-radius: 16px;
        background: var(--mon-surface);
        border: 1px solid rgba(219, 228, 241, 0.9);
        box-shadow: var(--mon-shadow-sm);
        min-height: 0;
        z-index: 1;
    }

    .mon-kpi-card.is-tip-open {
        z-index: 40;
    }

    .mon-kpi-card::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 4px;
        background: var(--mon-kpi-color, var(--mon-accent));
    }

    .mon-kpi-card__label {
        display: flex;
        align-items: center;
        gap: 0.38rem;
        margin: 0 0 0.24rem;
        font-size: 0.6rem;
        font-weight: 800;
        color: var(--mon-text-soft);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        line-height: 1.1;
    }

    .mon-kpi-card__value {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 800;
        color: var(--mon-text);
        line-height: 1;
    }

    .mon-kpi-card__main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
    }

    .mon-kpi-card__main-copy {
        min-width: 0;
        flex: 1 1 auto;
    }

    .mon-kpi-card__detail {
        margin: 0.18rem 0 0;
        font-size: 0.61rem;
        color: var(--mon-kpi-color, var(--mon-accent));
        font-weight: 700;
        line-height: 1.1;
    }

    .mon-kpi-card__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.35rem;
    }

    .mon-kpi-card__head .mon-kpi-card__label {
        margin: 0;
    }

    .mon-kpi-card__stack {
        display: grid;
        gap: 0.08rem;
        margin-top: 0.16rem;
    }

    .mon-kpi-card__sub {
        font-size: 0.6rem;
        color: var(--mon-text-soft);
        font-weight: 700;
        line-height: 1.08;
    }

    .mon-kpi-card__sub strong {
        color: var(--mon-text);
    }

    .mon-kpi-card__side {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.38rem;
        margin-top: 0.14rem;
    }

    .mon-kpi-card__side--compact {
        margin-top: 0;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        gap: 0.02rem;
        text-align: right;
        white-space: nowrap;
    }

    .mon-kpi-card__side span {
        font-size: 0.56rem;
        color: var(--mon-text-soft);
        font-weight: 700;
        line-height: 1;
    }

    .mon-kpi-card__side strong {
        font-size: 0.8rem;
        color: var(--mon-kpi-color, var(--mon-accent));
        font-weight: 800;
        line-height: 1;
    }

    .mon-kpi-card__mini-list {
        display: grid;
        gap: 0.1rem;
        margin-top: 0.18rem;
    }

    .mon-kpi-card__mini-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.35rem;
        font-size: 0.59rem;
        color: var(--mon-text-soft);
        font-weight: 700;
        line-height: 1.08;
    }

    .mon-kpi-card__mini-row strong {
        color: var(--mon-text);
    }

    .mon-kpi-card__comp-list {
        display: grid;
        gap: 0.12rem;
        margin-top: 0.18rem;
    }

    .mon-kpi-card__comp-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.59rem;
        line-height: 1.06;
    }

    .mon-kpi-card__comp-row span {
        min-width: 0;
        color: var(--mon-text-soft);
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mon-kpi-card__comp-row strong {
        color: var(--mon-text);
        font-weight: 800;
    }

    .mon-kpi-card__comp-row em {
        color: var(--mon-kpi-color, var(--mon-accent));
        font-style: normal;
        font-weight: 800;
    }

    .mon-kpi-card__tip-btn {
        flex: 0 0 auto;
        min-width: 46px;
        height: 21px;
        padding: 0 0.4rem;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.1);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(241, 245, 249, 0.98) 100%);
        color: var(--mon-kpi-color, var(--mon-accent));
        font-size: 0.55rem;
        font-weight: 800;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.18rem;
        box-shadow: 0 3px 10px rgba(15, 23, 42, 0.08);
        letter-spacing: 0.02em;
    }

    .mon-kpi-card__tip-btn i {
        line-height: 1;
    }

    .mon-kpi-card__tip-btn.is-open {
        background: var(--mon-kpi-color, var(--mon-accent));
        color: #fff;
        border-color: transparent;
    }

    .mon-kpi-card__tooltip {
        display: none;
        position: absolute;
        top: calc(100% - 0.15rem);
        right: 0;
        width: min(250px, calc(100vw - 2.5rem));
        padding: 0.52rem 0.62rem;
        border-radius: 12px;
        background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
        color: #f8fafc;
        box-shadow: 0 16px 34px rgba(15, 23, 42, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 999;
    }

    .mon-kpi-card__tooltip.is-open {
        display: block;
    }

    .mon-kpi-card__tooltip-title {
        font-size: 0.58rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #cbd5e1;
        margin-bottom: 0.25rem;
        line-height: 1.05;
    }

    .mon-kpi-card__tooltip-list {
        display: grid;
        gap: 0.16rem;
    }

    .mon-kpi-card__tooltip-row {
        display: flex;
        justify-content: space-between;
        gap: 0.35rem;
        font-size: 0.62rem;
        line-height: 1.08;
    }

    .mon-kpi-card__tooltip-row span {
        color: #e2e8f0;
    }

    .mon-kpi-card__tooltip-row strong {
        color: #93c5fd;
        font-weight: 800;
        text-align: right;
    }

    .mon-filter-card,
    .mon-panel,
    .mon-chart-card,
    .mon-toolbar-card {
        background: var(--mon-surface);
        border: 1px solid rgba(219, 228, 241, 0.9);
        border-radius: var(--mon-radius-md);
        box-shadow: var(--mon-shadow-sm);
    }

    .mon-filter-card {
        padding: 1rem 1rem 0.95rem;
    }

    .mon-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
        flex-wrap: wrap;
        margin-bottom: 0.9rem;
    }

    .mon-toolbar__title {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        margin: 0;
        font-size: 0.9rem;
        font-weight: 800;
        color: var(--mon-text);
    }

    .mon-toolbar__subtitle {
        margin: 0.18rem 0 0;
        font-size: 0.72rem;
        color: var(--mon-text-soft);
    }

    .mon-toolbar__actions {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
        margin-left: auto;
    }

    .mon-search-wrap {
        position: relative;
        min-width: 215px;
        flex: 1 1 240px;
        max-width: 340px;
    }

    .mon-search-wrap i {
        position: absolute;
        top: 50%;
        left: 0.85rem;
        transform: translateY(-50%);
        color: var(--mon-text-soft);
        font-size: 0.78rem;
    }

    .mon-input,
    .mon-select {
        width: 100%;
        min-height: 40px;
        padding: 0.58rem 0.78rem;
        border-radius: 14px;
        border: 1px solid var(--mon-border);
        background: var(--mon-surface-soft);
        color: var(--mon-text);
        font-size: 0.75rem;
        outline: none;
    }

    .mon-search-wrap .mon-input {
        padding-left: 2.35rem;
        border-radius: 999px;
        min-height: 42px;
        background: #fff;
    }

    .mon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        min-height: 40px;
        padding: 0.6rem 0.9rem;
        border-radius: 12px;
        border: 1px solid transparent;
        font-size: 0.76rem;
        font-weight: 700;
        cursor: pointer;
    }

    .mon-btn--primary {
        color: #fff;
        background: linear-gradient(135deg, var(--mon-primary) 0%, var(--mon-accent) 100%);
        box-shadow: 0 10px 20px rgba(10, 47, 117, 0.22);
    }

    .mon-btn--ghost {
        color: var(--mon-primary);
        background: rgba(13, 110, 253, 0.06);
        border-color: rgba(13, 110, 253, 0.18);
    }

    .mon-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
        gap: 0.75rem;
    }

    .mon-field {
        display: grid;
        gap: 0.32rem;
    }

    .mon-field label {
        font-size: 0.64rem;
        font-weight: 800;
        color: var(--mon-text-soft);
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .mon-tabs {
        display: inline-flex;
        gap: 0.2rem;
        padding: 0.18rem;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.05);
        border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .mon-tab-content {
        display: none;
        min-width: 0;
    }

    .mon-tab-content.is-active {
        display: block;
        min-width: 0;
    }

    .mon-panel {
        overflow: hidden;
    }

    .mon-panel__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
        padding: 0.95rem 1rem;
        background: linear-gradient(135deg, #0a2f75 0%, #1e40af 100%);
        color: #fff;
    }

    .mon-panel__title {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.84rem;
        font-weight: 800;
    }

    .mon-panel__meta {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.82);
    }

    .mon-wrap-cell {
        max-width: 180px;
        white-space: normal;
        line-height: 1.4;
        font-size: 0.68rem;
    }

    .mon-toolbar-card {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.7rem;
        padding: 0.95rem 1rem;
    }

    .mon-toolbar-card>span {
        font-size: 0.7rem;
        font-weight: 800;
        color: var(--mon-primary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
    }

    .mon-toolbar-card>div {
        display: flex;
        align-items: center;
        gap: 0.35rem;
    }

    .mon-toolbar-card .mon-toolbar {
        margin-bottom: 0;
    }

    .mon-toolbar-card .mon-toolbar__title {
        font-size: 0.8rem;
    }

    .mon-dashboard-grid {
        display: grid;
        gap: 0.9rem;
    }

    .mon-dashboard-grid--split {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .mon-chart-card {
        overflow: hidden;
    }

    .mon-chart-card__header {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.46rem 0.62rem;
        color: #fff;
        background: linear-gradient(135deg, var(--mon-card-color, #0a2f75), color-mix(in srgb, var(--mon-card-color, #0a2f75) 72%, white));
    }

    .mon-chart-card__title {
        flex: 1;
        font-size: 0.74rem;
        font-weight: 800;
        line-height: 1.1;
    }

    .mon-chart-card__body {
        padding: 0.85rem;
    }

    .mon-chart-stage {
        position: relative;
        height: 290px;
    }

    .mon-pill-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-bottom: 0.7rem;
    }

    .mon-pill {
        min-height: 32px;
        padding: 0.35rem 0.8rem;
        border-radius: 999px;
        border: 1px solid rgba(168, 85, 247, 0.28);
        background: #fff;
        color: #7e22ce;
        font-size: 0.68rem;
        font-weight: 800;
        cursor: pointer;
    }

    .mon-pill.is-active {
        background: #a855f7;
        color: #fff;
        border-color: #a855f7;
    }

    .mon-pill--soft {
        min-height: 28px;
        padding: 0.28rem 0.68rem;
        font-size: 0.64rem;
        border-color: rgba(148, 163, 184, 0.26);
        color: #475569;
    }

    .mon-route-filter {
        position: relative;
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.7rem;
    }

    .mon-route-filter__bar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.35rem;
    }

    .mon-route-filter__summary {
        font-size: 0.66rem;
        color: #64748b;
        font-weight: 700;
    }

    .mon-route-filter__menu {
        display: none;
        position: absolute;
        top: calc(100% + 0.15rem);
        left: 0;
        z-index: 20;
        width: min(280px, 100%);
        padding: 0.65rem;
        border-radius: 14px;
        background: #fff;
        border: 1px solid rgba(226, 232, 240, 0.92);
        box-shadow: 0 18px 38px rgba(15, 23, 42, 0.16);
    }

    .mon-route-filter__menu.is-open {
        display: block;
    }

    .mon-route-filter__search {
        width: 100%;
        min-height: 32px;
        margin-bottom: 0.45rem;
        padding: 0.38rem 0.62rem;
        border-radius: 10px;
        border: 1px solid rgba(203, 213, 225, 0.95);
        background: #f8fafc;
        font-size: 0.68rem;
        color: #0f172a;
        outline: none;
    }

    .mon-route-filter__list {
        display: grid;
        gap: 0.22rem;
        max-height: 188px;
        overflow: auto;
        padding-right: 0.12rem;
    }

    .mon-route-filter__item {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.24rem 0.12rem;
        font-size: 0.67rem;
        color: #334155;
        font-weight: 700;
    }

    .mon-route-filter__item input {
        accent-color: #2563eb;
    }

    .mon-fs-btn {
        min-height: 28px;
        min-width: 28px;
        padding: 0;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        cursor: pointer;
        font-size: 0.74rem;
    }

    .mon-empty {
        display: grid;
        place-items: center;
        gap: 0.45rem;
        min-height: 220px;
        padding: 1.4rem;
        text-align: center;
        color: #94a3b8;
    }

    .mon-empty i {
        font-size: 1.45rem;
    }

    .mon-empty p {
        margin: 0;
        font-size: 0.8rem;
        font-weight: 700;
    }

    .mon-empty span {
        font-size: 0.7rem;
        color: var(--mon-text-soft);
    }

    /* ── Tabs (misma lógica que sne_objecion) ── */
    .tab-btn-mon {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.45rem 0.9rem;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--mon-text-soft);
        font-size: 0.73rem;
        font-weight: 800;
        cursor: pointer;
        line-height: 1;
    }

    .tab-btn-mon.active {
        color: #fff;
        background: linear-gradient(135deg, var(--mon-primary) 0%, var(--mon-accent) 100%);
        box-shadow: 0 8px 16px rgba(10, 47, 117, 0.18);
    }

    /* ── Fullscreen overlay para charts ── */
    #monFsOverlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9989;
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        cursor: pointer;
    }

    .mon-card-fs {
        position: fixed !important;
        inset: 0 !important;
        z-index: 9990 !important;
        border-radius: 0 !important;
        overflow-y: auto !important;
        box-shadow: none !important;
        display: flex !important;
        flex-direction: column !important;
    }

    .mon-card-fs .mon-chart-card__body,
    .mon-card-fs .mon-card-body {
        flex: 1 !important;
        display: flex !important;
        flex-direction: column !important;
    }

    .mon-card-fs .mon-chart-stage,
    .mon-card-fs .mon-canvas-cont {
        height: calc(100vh - 130px) !important;
        flex: 1 !important;
    }

    /* ── Tabla ── */
    .mon-table {
        border-collapse: collapse;
        width: 100%;
        font-size: 0.7rem;
    }

    .mon-table th,
    .mon-table td {
        border: 1px solid #e2e8f0;
        padding: 0.28rem 0.45rem;
        white-space: nowrap;
    }

    .mon-table thead th {
        background: #0a2f75;
        color: white;
        font-weight: 700;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 3;
    }

    #repTableWrap thead th {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #0a2f75;
        box-shadow: inset 0 -1px 0 #1e3a8a;
    }

    .mon-table thead tr.th-sub th {
        background: #1e40af;
        color: #dbeafe;
        font-weight: 600;
        font-size: 0.67rem;
    }

    .mon-table tbody tr:nth-child(even) td {
        background: #fafbfc;
    }

    .mon-table tbody tr:hover td {

{% block content %}
<div class="mon-page">
    <div class="mon-shell">

        <!-- ══ ENCABEZADO ══════════════════════════════════════════════════════ -->
        <section class="mon-hero">
            <div class="mon-hero__content">
                <h1 class="mon-hero__title">Monitor de asignaciones, kilómetros y objeciones</h1>
            </div>
            <div class="mon-hero__meta">
                <div class="mon-hero-stat">
                    <div class="mon-hero-stat__value">
                        <i class="bi bi-calendar-event"></i>
                        <strong id="monToday">--</strong>
                    </div>
                </div>
            </div>
        </section>

        <!-- ══ KPI CARDS (se actualizan al cargar la tabla) ═══════════════════ -->
        <div id="monStatsContainer" class="mon-stats-grid">
        </div>

        <!-- ══ FILTROS GLOBALES ════════════════════════════════════════════════ -->
        <section class="mon-filter-card">
            <div class="mon-toolbar">
                <div class="mon-toolbar__title-wrap">
                    <h2 class="mon-toolbar__title">
                        <i class="bi bi-funnel"></i> Filtros
                    </h2>
                </div>
                <div class="mon-toolbar__actions">
                    <div class="mon-search-wrap">
                        <i class="bi bi-search"></i>
                        <input type="text" id="monSearch" placeholder="Buscar en la grilla" oninput="monSearchTable()"
                            class="mon-input">
                    </div>
                    <button onclick="monCargar()" title="Consultar" class="mon-btn mon-btn--primary">
                        <i class="bi bi-search"></i> Consultar
                    </button>
                    <button onclick="monLimpiar()" title="Limpiar" class="mon-btn mon-btn--ghost">

            </div>

            <div class="mon-grid">

                <div class="mon-field">

                <div class="mon-field">
                    <label for="monComponente">Componente</label>
                    <select id="monComponente" onchange="monLoadZonas()" class="mon-select">

                <div class="mon-field">

                    </select>

                <div class="mon-field">
                    <label for="monCop">COP</label>
                    <select id="monCop" class="mon-select">

                    </select>
                </div>
                <div class="mon-field">
                    <label for="monRuta">Ruta</label>
                    <select id="monRuta" class="mon-select">
                        <option value="">-- Todas --</option>
                    </select>
                </div>
                <div class="mon-field">
                    <label for="monAsignador">Asignador</label>
                    <select id="monAsignador" class="mon-select">
                        <option value="">-- Todos --</option>
                    </select>
                </div>
                <div class="mon-field">
                    <label for="monEstAsig">Estado asignación</label>

                        <option value="1">Asignado</option>

                <div class="mon-field">
                    <label for="monRevisor">Revisor</label>
                    <select id="monRevisor" class="mon-select">
                        <option value="">-- Todos --</option>
                    </select>

                <div class="mon-field">

                    <select id="monEstObj" class="mon-select">

        <!-- ══ TABS ════════════════════════════════════════════════════════════ -->

        <div id="tab-procesamientos" class="mon-tab-content"></div>

        <!-- ══ FULLSCREEN OVERLAY ═════════════════════════════════════════════ -->
        <div id="monFsOverlay" onclick="monCloseFsFromOverlay()"></div>

    </div>

<!-- ══════════════════════════════════════════════════════════════════════
    JAVASCRIPT
══════════════════════════════════════════════════════════════════════ -->
<script>
    (function () {
        'use strict';

        var API = '/monitor/api';
        var _charts = {};           // echarts instances keyed by div id
        var _tableData = [];        // data completa para búsqueda
        var _filteredTableData = []; // data filtrada visible en grilla
        var _activeTab = 'asignaciones';
        var _repData = [];
        var _reportesBuilt = false;
        var _defaultFechaIni = '';
        var _defaultFechaFin = '';

        /* ── Helpers ─────────────────────────────────────────────────────── */
        function _q(id) { return document.getElementById(id); }
        function _num(v) {
            var n = Number(v);
            return isFinite(n) ? n : 0;
        }
        function _fmtInt(v) {
            return Math.round(_num(v)).toLocaleString('es-CO');
        }
        function _fmtKm(v) {
            return _num(v).toLocaleString('es-CO', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        }
        function _fmtPct(v) {
            return _num(v).toLocaleString('es-CO', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '%';
        }
        function _sumRows(rows, key) {
            return rows.reduce(function (acc, row) { return acc + _num(row[key]); }, 0);
        }
        function _esc(v) {
            return String(v == null ? '' : v)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        function _parseDate(v) {
            if (!v) return null;
            var d = new Date(v + 'T00:00:00');
            return isNaN(d.getTime()) ? null : d;
        }
        function _fmtDateInput(d) {
            if (!d || isNaN(d.getTime())) return '';
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }
        function _dateParams() {
            var p = [];
            var fi = _q('monFechaIni').value, ff = _q('monFechaFin').value;
            if (fi) p.push('fecha_ini=' + fi);
            if (ff) p.push('fecha_fin=' + ff);
            return p;
        }
        function _syncDateRange(showAlert) {
            var iniEl = _q('monFechaIni');
            var finEl = _q('monFechaFin');
            var ini = _parseDate(iniEl.value);
            var fin = _parseDate(finEl.value);
            if (!ini || !fin) return true;
            if (fin < ini) {
                finEl.value = iniEl.value;
                if (showAlert) alert('La fecha final no puede ser inferior a la fecha inicial.');
                fin = _parseDate(finEl.value);
            }
            var maxFin = new Date(ini.getTime());
            maxFin.setMonth(maxFin.getMonth() + 6);
            if (fin > maxFin) {
                finEl.value = _fmtDateInput(maxFin);
                if (showAlert) alert('La consulta no puede superar 6 meses. Se ajustó la fecha final automáticamente.');
            }
            return true;
        }

        function _closeCardTips(exceptCard) {
            document.querySelectorAll('.mon-kpi-card__tooltip.is-open').forEach(function (tip) {
                if (!exceptCard || !exceptCard.contains(tip)) tip.classList.remove('is-open');
            });
            document.querySelectorAll('.mon-kpi-card__tip-btn.is-open').forEach(function (btn) {
                if (!exceptCard || !exceptCard.contains(btn)) btn.classList.remove('is-open');
            });
            document.querySelectorAll('.mon-kpi-card.is-tip-open').forEach(function (card) {
                if (!exceptCard || card !== exceptCard) card.classList.remove('is-tip-open');
            });
        }

        window.monToggleCardTip = function (ev) {
            if (ev) ev.stopPropagation();
            var btn = ev && ev.currentTarget ? ev.currentTarget : null;
            var card = btn ? btn.closest('.mon-kpi-card') : null;
            if (!card) return;
            var tip = card.querySelector('.mon-kpi-card__tooltip');
            if (!tip) return;
            var open = !tip.classList.contains('is-open');
            _closeCardTips(card);
            tip.classList.toggle('is-open', open);
            btn.classList.toggle('is-open', open);
            card.classList.toggle('is-tip-open', open);
        };

        document.addEventListener('click', function (ev) {
            if (!ev.target.closest('.mon-kpi-card')) _closeCardTips();
        });

        function _fillSelect(sel, items, valKey, lblKey) {
            var old = sel.value;
            while (sel.options.length > 1) sel.remove(1);
            items.forEach(function (it) {
                var o = document.createElement('option');
                o.value = it[valKey]; o.text = it[lblKey];
                sel.appendChild(o);
            });
            if (old) sel.value = old;
        }

        function _get(url) { return fetch(url).then(function (r) { return r.json(); }); }

        function _gp() {   // get params from global filters
            var p = [];
            var comp = _q('monComponente').value, zona = _q('monZona').value;
            var cop = _q('monCop').value, ruta = _q('monRuta').value;
            p = p.concat(_dateParams());
            if (comp) p.push('componente=' + encodeURIComponent(comp));
            if (zona) p.push('zona=' + encodeURIComponent(zona));
            if (cop) p.push('id_cop=' + cop);
            if (ruta) p.push('id_linea=' + ruta);
            return p;
        }

        /* ── Fecha hoy en encabezado ──────────────────────────────────────── */
        _q('monToday').textContent = new Date().toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });

        /* ══════════════════════════════════════════════════════════════════
        CARGA DE FILTROS (cascada)
        ══════════════════════════════════════════════════════════════════ */
        function _loadComponentes() {
            _get(API + '/filtros/componentes').then(function (j) {
                if (!j.ok) return;
                var sel = _q('monComponente');
                while (sel.options.length > 1) sel.remove(1);
                j.data.forEach(function (c) { var o = document.createElement('option'); o.value = c; o.text = c; sel.appendChild(o); });
            });
        }

        window.monLoadZonas = function () {
            var comp = _q('monComponente').value;
            _get(API + '/filtros/zonas' + (comp ? '?componente=' + encodeURIComponent(comp) : '')).then(function (j) {
                if (!j.ok) return;
                var sel = _q('monZona'); while (sel.options.length > 1) sel.remove(1);
                j.data.forEach(function (z) { var o = document.createElement('option'); o.value = z; o.text = z; sel.appendChild(o); });
            });
            _q('monCop').innerHTML = '<option value="">-- Todos --</option>';
        };

        window.monLoadCop = function () {
            var p = []; var comp = _q('monComponente').value, zona = _q('monZona').value;
            if (comp) p.push('componente=' + encodeURIComponent(comp));
            if (zona) p.push('zona=' + encodeURIComponent(zona));
            _get(API + '/filtros/cop' + (p.length ? '?' + p.join('&') : '')).then(function (j) {
                if (j.ok) _fillSelect(_q('monCop'), j.data, 'id', 'cop');
            });
        };

        window.monLoadRutas = function () {
            var p = _dateParams();
            _get(API + '/filtros/rutas' + (p.length ? '?' + p.join('&') : '')).then(function (j) {
                if (j.ok) _fillSelect(_q('monRuta'), j.data, 'id_linea', 'ruta_comercial');
            });
        };

        function _loadUsuarios() {
            var p = _gp();
            var qs = p.length ? '?' + p.join('&') : '';
            _get(API + '/usuarios-revisores' + qs).then(function (j) { if (j.ok) _fillSelect(_q('monRevisor'), j.data, 'id', 'nombre_completo'); });
            _get(API + '/usuarios-asignadores' + qs).then(function (j) { if (j.ok) _fillSelect(_q('monAsignador'), j.data, 'id', 'nombre_completo'); });
        }

        window.monHandleDateChange = function () {
            _syncDateRange(true);
            _q('monRuta').value = '';
            window.monLoadRutas();
            _loadUsuarios();
        };

        window.monLimpiar = function () {
            ['monComponente', 'monZona', 'monCop', 'monRuta',
                'monAsignador', 'monEstAsig', 'monRevisor', 'monEstObj'].forEach(function (id) { _q(id).value = ''; });
            _q('monFechaIni').value = _defaultFechaIni;
            _q('monFechaFin').value = _defaultFechaFin;
            _q('monSearch').value = '';
            _syncDateRange(false);
            window.monLoadRutas();
            _loadUsuarios();
        };

        /* ══════════════════════════════════════════════════════════════════
        TABS
        ══════════════════════════════════════════════════════════════════ */
        window.monSwitchTab = function (e, tabName) {
            _activeTab = tabName;
            document.querySelectorAll('.tab-btn-mon').forEach(function (b) { b.classList.remove('active'); });
            e.currentTarget.classList.add('active');
            document.querySelectorAll('.mon-tab-content').forEach(function (d) { d.classList.remove('is-active'); });
            _q('tab-' + tabName).classList.add('is-active');
            if (tabName === 'resultados') _loadDashboard();
            if (tabName === 'reportes') _loadReportes();
            if (tabName === 'procesamientos') _loadProcesamientos();
        };

        /* ══════════════════════════════════════════════════════════════════
        CONSULTAR (aplica a ambas tabs)
        ══════════════════════════════════════════════════════════════════ */
        window.monCargar = function () {
            _syncDateRange(true);
            _loadAsignaciones();
            if (_activeTab === 'resultados') _loadDashboard();
            if (_activeTab === 'reportes') _loadReportes();
            if (_activeTab === 'procesamientos') _loadProcesamientos(true);
        };

        /* ══════════════════════════════════════════════════════════════════
        TAB 1 – ASIGNACIONES
        ══════════════════════════════════════════════════════════════════ */

        function _loadAsignaciones() {
            var cont = _q('tab-asignaciones');
            cont.innerHTML = '<section class="mon-panel"><div class="mon-empty"><i class="bi bi-hourglass-split"></i><p>Cargando monitor</p><span>Estamos consultando la información del mes y la grilla por ruta.</span></div></section>';

            var p = _gp();
            var estAsig = _q('monEstAsig').value, revisor = _q('monRevisor').value;
            var asig = _q('monAsignador').value, estObj = _q('monEstObj').value;

        function _renderHistogramRutas(rows, modo) {
            var inst = _ec('chartHistRutas'); if (!inst) return;
            if (!rows || !rows.length) { _setNoDataChart('chartHistRutas', 'Sin datos con los filtros'); return; }

            // ── Paso 1: agregar por ruta (igual que el scatter) ──────────────
            var map = {};
            rows.forEach(function (r) {
                var ruta = r.ruta_comercial || 'Sin Ruta';
                var km = _num(r.km_valor);
                if (!map[ruta]) map[ruta] = { ruta: ruta, km: 0, viajes: 0 };
                map[ruta].km += km;
                map[ruta].viajes += 1;
            });
            var rutaList = Object.keys(map).map(function (k) { return map[k]; }).filter(function (d) { return d.km > 0; });
            if (!rutaList.length) { _setNoDataChart('chartHistRutas', 'Sin datos con los filtros'); return; }

            // ── Paso 2: nice-step binning dinámico ───────────────────────────
            // Calcula un paso redondeado a cifra "bonita" (1·10^n, 2·10^n,
            // 2.5·10^n, 5·10^n) para que los bordes de bin sean valores limpios
            // y la cantidad de bins quede entre 5 y 10 según los datos.
            var kmValues = rutaList.map(function (d) { return d.km; });
            var rawMin = Math.min.apply(null, kmValues);
            var rawMax = Math.max.apply(null, kmValues);

            function _niceStep(dataRange, target) {
                if (dataRange <= 0) return 1;
                var rough = dataRange / target;
                var mag = Math.pow(10, Math.floor(Math.log10(rough)));
                var factors = [1, 2, 2.5, 5, 10];
                for (var fi = 0; fi < factors.length; fi++) {
                    if (factors[fi] * mag >= rough) return factors[fi] * mag;
                }
                return 10 * mag;
            }

            // Objetivo: ~7 bins (se ajusta entre 5 y 10 solos con el nice-step)
            var targetBins = Math.max(5, Math.min(10, Math.round(Math.sqrt(rutaList.length))));
            var step = _niceStep(rawMax - rawMin, targetBins);

            // Fronteras "bonitas" alineadas al paso
            var niceMin = Math.floor(rawMin / step) * step;
            var niceMax = Math.ceil(rawMax / step) * step;
            if (niceMax <= niceMin) niceMax = niceMin + step;   // al menos 1 bin

            var bins = Math.round((niceMax - niceMin) / step);
            if (bins < 1) bins = 1;

            var ranges = [];
            for (var i = 0; i < bins; i++) {
                var from = niceMin + i * step;
                var to = from + step;
                ranges.push({ from: from, to: to, viajes: 0, kmSum: 0, rutas: 0 });
            }

            // ── Paso 3: asignar cada ruta al bin correspondiente ─────────────
            rutaList.forEach(function (d) {
                var idx = Math.min(ranges.length - 1, Math.floor((d.km - niceMin) / step));
                if (idx < 0) idx = 0;
                ranges[idx].viajes += d.viajes;   // y-axis: cantidad de viajes
                ranges[idx].kmSum += d.km;        // para tooltip
                ranges[idx].rutas += 1;           // cantidad de rutas en el bin
            });

            var colorMap = { sne: '#0f766e', asignado: '#2563eb', objetado: '#dc2626' };
            var titleMap = { sne: 'Kilometros SNE', asignado: 'Km Asignados', objetado: 'Km Objetados' };

            var labels = ranges.map(function (r) { return _fmtKm(r.from) + ' – ' + _fmtKm(r.to); });
            var viajesD = ranges.map(function (r) { return r.viajes; });
            var kmSumD = ranges.map(function (r) { return Math.round(r.kmSum * 10) / 10; });
            var rutasD = ranges.map(function (r) { return r.rutas; });

            inst.setOption({
                backgroundColor: '#fff',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: 'rgba(15, 23, 42, 0.96)',
                    borderWidth: 0,
                    textStyle: { color: '#f8fafc', fontSize: 11 },
                    formatter: function (params) {
                        var idx = params && params.length ? params[0].dataIndex : 0;
                        return '<div style="font-weight:800;margin-bottom:6px;">' + _esc(labels[idx]) + ' km</div>'
                            + '<div style="display:flex;justify-content:space-between;gap:16px;"><span>Rutas en rango</span><strong>' + _fmtInt(rutasD[idx]) + '</strong></div>'
                            + '<div style="display:flex;justify-content:space-between;gap:16px;"><span>Viajes acumulados</span><strong>' + _fmtInt(viajesD[idx]) + '</strong></div>'
                            + '<div style="display:flex;justify-content:space-between;gap:16px;"><span>Km totales rango</span><strong>' + _fmtKm(kmSumD[idx]) + '</strong></div>';
                    }
                },
                grid: { top: 26, bottom: 62, left: 52, right: 18, containLabel: false },
                xAxis: {
                    type: 'category',
                    data: labels,
                    name: 'Km por Ruta',
                    nameLocation: 'middle',
                    nameGap: 42,
                    nameTextStyle: { color: '#475569', fontSize: 11, fontWeight: 700 },
                    axisLabel: { fontSize: 9, color: '#64748b', rotate: 32, interval: 0 },
                    axisTick: { alignWithLabel: true }

                yAxis: {
                    type: 'value',
                    name: 'Viajes',
                    nameTextStyle: { color: '#475569', fontSize: 11, fontWeight: 700 },
                    axisLabel: { fontSize: 10, color: '#64748b', formatter: function (v) { return _fmtInt(v); } },
                    splitLine: { lineStyle: { color: 'rgba(148,163,184,0.16)' } }
                },
                series: [{
                    name: titleMap[modo] || 'Kilometros',
                    type: 'bar',
                    data: viajesD,
                    barMaxWidth: 28,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: echarts.color.modifyAlpha(colorMap[modo] || '#0f766e', 0.92) },
                            { offset: 1, color: echarts.color.modifyAlpha(colorMap[modo] || '#0f766e', 0.55) }

            var overlay = _q('monFsOverlay');

                // Limpiar height inline para que el CSS !important tome control total
                if (cont) cont.style.height = '';
                if (overlay) overlay.style.display = 'block';
                if (btn) btn.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
                document.body.style.overflow = 'hidden';
                document.addEventListener('keydown', _fsEscHandler);
            } else {
                card.classList.remove('mon-card-fs');
                if (cont) cont.style.height = '260px';
                if (overlay) overlay.style.display = 'none';
                if (btn) btn.innerHTML = '<i class="bi bi-arrows-fullscreen"></i>';
                document.body.style.overflow = '';
                document.removeEventListener('keydown', _fsEscHandler);
            }
            // Redimensionar el chart — doble llamada para garantizar layout estable
            var inst = _charts[divId];
            setTimeout(function () {
                if (inst) try { inst.resize(); } catch (e) { }
                setTimeout(function () {
                    if (inst) try { inst.resize(); } catch (e) { }
                }, 180);
            }, 60);
        };

            if (!v) return '';
            var d = new Date(String(v).replace(' ', 'T'));
            if (isNaN(d.getTime())) return String(v);
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' })
                + ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }

        var REP_COLS_SNE_PROCESADO = [
            { key: 'fecha',            label: 'Fecha' },
            { key: 'id_ics',           label: 'ID ICS' },
            { key: 'id_linea',         label: 'ID Línea' },
            { key: 'ruta_comercial',   label: 'Ruta Comercial' },
            { key: 'servicio',         label: 'Servicio' },
            { key: 'tabla',            label: 'Tabla' },
            { key: 'viaje_linea',      label: 'Viaje Línea' },
            { key: 'id_viaje',         label: 'ID Viaje' },
            { key: 'sentido',          label: 'Sentido' },
            { key: 'vehiculo_real',    label: 'Vehículo Real' },
            { key: 'hora_ini_teorica', label: 'Hora Ini. Teórica' },
            { key: 'km_prog_ad',       label: 'Km Prog. AD' },
            { key: 'conductor',        label: 'Conductor' },
            { key: 'km_elim_eic',      label: 'Km Elim. EIC' },
            { key: 'km_ejecutado',     label: 'Km Ejecutado' },
            { key: 'offset_inicio',    label: 'Offset Inicio' },
            { key: 'offset_fin',       label: 'Offset Fin' },
            { key: 'km_revision',      label: 'Km Revisión' },
            { key: 'motivo',           label: 'Motivo' },
            { key: 'fecha_carga',      label: 'Fecha Carga', fmt: _fmtShortDateTime },
            { key: 'componente',       label: 'Componente' },
            { key: 'zona',             label: 'Zona' },
            { key: 'cop',              label: 'COP' },
        ];

        function _buildReportesUI(cont) {
            cont.innerHTML = [
                '<section class="mon-panel" style="padding:1rem 1.1rem;min-width:0;overflow:hidden;">',
                  '<div style="display:flex;gap:0.75rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:1rem;">',
                    '<div class="mon-field" style="min-width:240px;">',
                      '<label for="repTipo" style="font-size:.72rem;font-weight:700;color:#3b546d;text-transform:uppercase;letter-spacing:.03em;">Tipo de reporte</label>',
                      '<select id="repTipo" class="mon-select" style="min-width:240px;">',
                        '<option value="">-- Seleccione un reporte --</option>',
                        '<option value="sne-procesado">SNE Procesado</option>',
                        '<option value="sne-gestionado">SNE Gestionado</option>',
                      '</select>',
                    '</div>',
                    '<button onclick="monRepCargar()" class="mon-btn mon-btn--primary" id="repBtnConsultar">',
                      '<i class="bi bi-search"></i> Consultar',
                    '</button>',
                    '<button onclick="monRepExportar()" class="mon-btn mon-btn--ghost" id="repBtnExportar">',
                      '<i class="bi bi-file-earmark-spreadsheet"></i> Exportar XLSX',
                    '</button>',
                    '<span id="repContador" style="font-size:.72rem;color:#64748b;align-self:center;"></span>',
                  '</div>',
                  '<div id="repStatus" style="padding:1.4rem;text-align:center;border-radius:14px;background:#f8fbff;border:1px solid #dbe4f1;margin-bottom:0.75rem;">',
                    '<i class="bi bi-file-earmark-bar-graph" style="font-size:1.8rem;color:#94a3b8;display:block;margin-bottom:0.5rem;"></i>',
                    '<strong style="color:#475569;font-size:.82rem;">Seleccione un reporte</strong>',
                    '<div style="font-size:.72rem;color:#94a3b8;margin-top:0.2rem;">Elija el tipo de reporte de la lista y presione Consultar.</div>',
                  '</div>',
                  '<div id="repTableWrap" style="display:none;width:100%;box-sizing:border-box;overflow:auto;border:1px solid #dde7f2;border-radius:14px;padding:0;background:linear-gradient(180deg,#f8fbff 0%,#f1f6fb 100%);max-height:540px;">',
                    '<table id="repTable" class="mon-table" style="width:max-content;min-width:100%;border-collapse:separate;border-spacing:0;">',
                      '<thead id="repTableHead"></thead>',
                      '<tbody id="repTableBody"></tbody>',
                    '</table>',
                  '</div>',
                '</section>',
            ].join('');
        }

        function _setRepStatus(kind, title, msg) {
            var el = _q('repStatus');
            if (!el) return;
            var iconMap  = { loading: 'bi-hourglass-split', error: 'bi-exclamation-triangle', success: 'bi-check-circle-fill', info: 'bi-file-earmark-bar-graph' };
            var colorMap = { loading: '#0d6efd', error: '#dc2626', success: '#16a34a', info: '#94a3b8' };
            var icon  = iconMap[kind]  || iconMap.info;
            var color = colorMap[kind] || colorMap.info;
            el.style.display = '';
            el.innerHTML =
                '<i class="bi ' + icon + '" style="font-size:1.8rem;color:' + color + ';display:block;margin-bottom:0.5rem;"></i>'
                + '<strong style="color:#475569;font-size:.82rem;">' + _esc(title) + '</strong>'
                + '<div style="font-size:.72rem;color:#94a3b8;margin-top:0.2rem;">' + _esc(msg) + '</div>';
        }

        function _renderRepTable(rows, cols) {
            var head = _q('repTableHead');
            var body = _q('repTableBody');
            var wrap = _q('repTableWrap');
            var cnt  = _q('repContador');
            if (!head || !body || !wrap) return;
            if (cnt) cnt.textContent = rows.length ? rows.length.toLocaleString('es-CO') + ' registros' : '';
            if (!rows.length) {
                head.innerHTML = '';
                body.innerHTML = '<tr><td colspan="' + cols.length + '" style="text-align:center;padding:1.2rem;color:#94a3b8;">Sin resultados para los filtros aplicados.</td></tr>';
                wrap.style.display = 'block';
                return;
            }
            head.innerHTML = '<tr>' + cols.map(function (c) { return '<th>' + _esc(c.label) + '</th>'; }).join('') + '</tr>';
            body.innerHTML = rows.map(function (row) {
                return '<tr>' + cols.map(function (c) {
                    var v = row[c.key];
                    var display = c.fmt ? c.fmt(v) : (v == null ? '' : v);
                    return '<td>' + _esc(display) + '</td>';
                }).join('') + '</tr>';
            }).join('');
            wrap.style.display = 'block';
        }

        window.monRepCargar = function () {
            if (!_reportesBuilt) return;
            var tipo = (_q('repTipo') || {}).value;
            if (!tipo) {
                _setRepStatus('info', 'Seleccione un reporte', 'Elija el tipo de reporte de la lista y presione Consultar.');
                var wrap = _q('repTableWrap'); if (wrap) wrap.style.display = 'none';
                return;
            }
            if (tipo === 'sne-gestionado') {
                _setRepStatus('info', 'Próximamente', 'El reporte SNE Gestionado estará disponible en una próxima versión.');
                var wrap = _q('repTableWrap'); if (wrap) wrap.style.display = 'none';
                return;
            }
            // SNE Procesado
            _setRepStatus('loading', 'Consultando...', 'Cargando datos del reporte SNE Procesado, por favor espere.');
            var wrap = _q('repTableWrap'); if (wrap) wrap.style.display = 'none';
            var btn = _q('repBtnConsultar');
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="mon-spinner"></span> Consultando'; }
            var p = _gp();
            var qs = p.length ? '?' + p.join('&') : '';
            _get(API + '/reportes/sne-procesado' + qs).then(function (j) {
                if (!j.ok) {
                    _setRepStatus('error', 'Error en la consulta', 'No fue posible cargar el reporte. Intente de nuevo.');
                    return;
                }
                _repData = j.data || [];
                if (_repData.length) {
                    var el = _q('repStatus'); if (el) el.style.display = 'none';
                } else {
                    _setRepStatus('info', 'Sin resultados', 'La consulta fue válida pero no devolvió registros para los filtros aplicados.');
                }
                _renderRepTable(_repData, REP_COLS_SNE_PROCESADO);
            }).catch(function () {
                _setRepStatus('error', 'Error de conexión', 'No fue posible comunicarse con el servidor.');
            }).finally(function () {
                var btn = _q('repBtnConsultar');
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-search"></i> Consultar'; }
            });
        };

        window.monRepExportar = function () {
            if (!_repData || !_repData.length) {
                alert('No hay datos para exportar. Consulte primero un reporte.');
                return;
            }
            var tipo = ((_q('repTipo') || {}).value) || 'reporte';
            var cols = tipo === 'sne-procesado' ? REP_COLS_SNE_PROCESADO : [];
            if (!cols.length) return;
            try {
                var wsData = [cols.map(function (c) { return c.label; })].concat(
                    _repData.map(function (row) {
                        return cols.map(function (c) {
                            if (row[c.key] == null) return '';
                            return c.fmt ? c.fmt(row[c.key]) : row[c.key];
                        });
                    })
                );
                var ws = XLSX.utils.aoa_to_sheet(wsData);
                var wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Reporte');
                XLSX.writeFile(wb, 'sne_' + tipo + '_' + new Date().toISOString().slice(0, 10) + '.xlsx');
            } catch (e) {
                alert('Error al generar el archivo XLSX: ' + e.message);
            }
        };

        function _loadReportes() {
            var cont = _q('tab-reportes');
            if (!cont) return;
            if (!_reportesBuilt) {
                _buildReportesUI(cont);
                _reportesBuilt = true;
            }
            var tipo = (_q('repTipo') || {}).value;
            if (tipo) window.monRepCargar();
        }

        /* ══════════════════════════════════════════════════════════════════
        TAB 4 – PROCESAMIENTOS
        ══════════════════════════════════════════════════════════════════ */

        var _procBuilt = false;
        var _procData  = null;

        var _PROC_STATUS_META = {
            ok:           { label: 'OK',           bg: '#16a34a', fg: '#ffffff' },
            pendiente:    { label: 'Pendiente',     bg: '#d97706', fg: '#ffffff' },
            error:        { label: 'Error',         bg: '#dc2626', fg: '#ffffff' },
            sin_archivos: { label: 'Sin archivos',  bg: '#64748b', fg: '#ffffff' },
        };

        function _procStatusCell(estado, detailObj, tipo) {
            if (!estado) {
                return '<td class="proc-cell-empty" style="background:#f1f5f9;color:#94a3b8;text-align:center;font-size:.68rem;">—</td>';
            }
            var m = _PROC_STATUS_META[estado] || { label: estado, bg: '#94a3b8', fg: '#fff' };
            var detail = detailObj ? JSON.stringify({ _tipo: tipo, _data: detailObj }) : '';
            return '<td class="proc-cell" '
                + 'style="background:' + m.bg + ';color:' + m.fg + ';text-align:center;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;padding:0.28rem 0.55rem;border-radius:6px;margin:2px;" '
                + 'data-detail=\'' + detail.replace(/'/g, '&#39;') + '\' '
                + 'onclick="_procToggleTip(event)">'
                + m.label
                + '</td>';
        }

        var _procActivCell = null;

        window._procToggleTip = function(e) {
            e.stopPropagation();
            var cell = e.currentTarget;
            var tip  = _q('procTooltip');

            // Si el tooltip ya está abierto para esta misma celda, cerrarlo
            if (_procActivCell === cell && tip.style.display !== 'none') {
                tip.style.display = 'none';
                _procActivCell = null;
                return;
            }
            _procActivCell = cell;

            var raw = cell.getAttribute('data-detail');
            if (!raw) return;
            var parsed;
            try { parsed = JSON.parse(raw); } catch(ex) { return; }
            var tipo = parsed._tipo;
            var d    = parsed._data;
            if (!d) return;

            var rows = [];
            if (tipo === 'pos') {
                if (d.intentos        != null) rows.push(['Intentos',        d.intentos]);
                if (d.ultima_ejecucion)        rows.push(['Última ejecución', d.ultima_ejecucion]);
                if (d.duracion_seg    != null) rows.push(['Duración (seg)',   d.duracion_seg]);
                if (d.archivos_total  != null) rows.push(['Archivos total',   d.archivos_total]);
                if (d.archivos_ok     != null) rows.push(['Archivos OK',      d.archivos_ok]);
                if (d.archivos_error  != null) rows.push(['Archivos error',   d.archivos_error]);
                if (d.registros_pos   != null) rows.push(['Registros pos.',   Number(d.registros_pos).toLocaleString('es-CO')]);
                if (d.filas_km        != null) rows.push(['Filas km',         Number(d.filas_km).toLocaleString('es-CO')]);
                if (d.actualizado_en)          rows.push(['Actualizado en',   d.actualizado_en]);
            } else {
                if (d.ultima_ejecucion)        rows.push(['Última ejecución', d.ultima_ejecucion]);
                if (d.duracion_seg    != null) rows.push(['Duración (seg)',   d.duracion_seg]);
                if (d.archivos_total  != null) rows.push(['Archivos total',   d.archivos_total]);
                if (d.archivos_ok     != null) rows.push(['Archivos OK',      d.archivos_ok]);
                if (d.archivos_error  != null) rows.push(['Archivos error',   d.archivos_error]);
                if (d.registros_proce != null) rows.push(['Registros proc.',  Number(d.registros_proce).toLocaleString('es-CO')]);
                if (d.fecha_actualizacion)     rows.push(['Actualización',    d.fecha_actualizacion]);
            }
            if (!rows.length) return;

            tip.innerHTML = rows.map(function(r) {
                return '<div class="proc-tip-row"><span>' + _esc(r[0]) + '</span><strong>' + _esc(String(r[1])) + '</strong></div>';
            }).join('');
            tip.style.display = 'block';

            // Posicionar junto a la celda (position:fixed → coordenadas viewport)
            var rect = cell.getBoundingClientRect();
            tip.style.left = '-9999px';
            tip.style.top  = '-9999px';
            tip.style.display = 'block';
            var tipW = tip.offsetWidth  || 230;
            var tipH = tip.offsetHeight || 180;
            var left = rect.left;
            var top  = rect.bottom + 6;
            if (left + tipW > window.innerWidth - 8)  left = rect.right  - tipW;
            if (left < 8) left = 8;
            if (top  + tipH > window.innerHeight - 8) top  = rect.top - tipH - 6;
            if (top  < 8) top  = 8;
            tip.style.left = left + 'px';
            tip.style.top  = top  + 'px';
        }

        document.addEventListener('click', function(e) {
            var tip = _q('procTooltip');
            if (tip && tip.style.display !== 'none' && !tip.contains(e.target)) {
                tip.style.display = 'none';
                _procActivCell = null;
            }
        });

        function _buildProcUI(cont) {
            var styleEl = document.createElement('style');
            styleEl.textContent = [
                '.proc-tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid #dde7f2;background:linear-gradient(180deg,#f8fbff,#f1f6fb);max-height:580px;}',
                '.proc-tbl{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0;}',
                '.proc-tbl thead th{position:sticky;top:0;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;font-size:.65rem;font-weight:700;text-transform:capitalize;letter-spacing:.01em;padding:.35rem .5rem;white-space:normal;word-break:break-word;max-width:90px;line-height:1.2;z-index:2;}',
                '.proc-tbl thead th:first-child{left:0;z-index:3;}',
                '.proc-tbl tbody td{padding:.32rem .5rem;vertical-align:middle;border-bottom:1px solid #e2e8f0;font-size:.72rem;}',
                '.proc-tbl tbody tr:last-child td{border-bottom:none;}',
                '.proc-tbl tbody tr:hover td{background:rgba(37,99,235,.04);}',
                '.proc-tbl td.proc-fecha{position:sticky;left:0;background:#f8fbff;font-weight:600;color:#1e3a5f;font-size:.72rem;white-space:nowrap;z-index:1;border-right:1px solid #dde7f2;}',
                '.proc-tbl tbody tr:hover td.proc-fecha{background:#eef4ff;}',
                '.proc-cell{transition:opacity .15s;}',
                '.proc-cell:hover{opacity:.85;}',
                '#procTooltip{position:fixed;display:none;z-index:9999;background:#1e293b;color:#e2e8f0;border-radius:10px;padding:.6rem .8rem;min-width:220px;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.28);}',
                '.proc-tip-row{display:flex;justify-content:space-between;gap:.5rem;font-size:.68rem;padding:.18rem 0;border-bottom:1px solid rgba(255,255,255,.08);}',
                '.proc-tip-row:last-child{border-bottom:none;}',
                '.proc-tip-row span{color:#94a3b8;flex:1;}',
                '.proc-tip-row strong{color:#f1f5f9;text-align:right;}',
            ].join('');
            document.head.appendChild(styleEl);

            var tip = document.createElement('div');
            tip.id = 'procTooltip';
            document.body.appendChild(tip);

            cont.innerHTML = '<section class="mon-panel mon-panel--compact" style="padding:1rem 1.1rem;">'
                + '<div class="mon-panel__header">'
                + '<div class="mon-panel__title"><i class="bi bi-cpu"></i><span>Logs de Procesamientos</span></div>'
                + '<div class="mon-panel__actions"><span id="procContador" class="mon-panel__meta"></span></div>'
                + '</div>'
                + '<div id="procStatus" style="padding:1.4rem;text-align:center;border-radius:14px;background:#f8fbff;border:1px solid #dbe4f1;margin-bottom:.75rem;">'
                + '<i class="bi bi-cpu" style="font-size:1.8rem;color:#94a3b8;display:block;margin-bottom:.5rem;"></i>'
                + '<strong style="color:#475569;font-size:.82rem;">Cargando procesamientos...</strong>'
                + '</div>'
                + '<div id="procTableWrap" class="proc-tbl-wrap" style="display:none;">'
                + '<table id="procTable" class="proc-tbl">'
                + '<thead id="procHead"></thead>'
                + '<tbody id="procBody"></tbody>'
                + '</table>'
                + '</div>'
                + '</section>';
        }

        function _renderProcTable(data) {
            var reportes = data.reportes || [];
            var rows     = data.rows     || [];
            var status   = _q('procStatus');
            var wrap     = _q('procTableWrap');
            var head     = _q('procHead');
            var body     = _q('procBody');
            var cntEl    = _q('procContador');

            if (!rows.length) {
                if (status) {
                    status.style.display = '';
                    status.innerHTML = '<i class="bi bi-inbox" style="font-size:1.8rem;color:#94a3b8;display:block;margin-bottom:.5rem;"></i>'
                        + '<strong style="color:#475569;font-size:.82rem;">Sin registros de procesamientos</strong>';
                }
                if (wrap) wrap.style.display = 'none';
                return;
            }

            // Encabezado
            var thHtml = '<tr>'
                + '<th style="min-width:90px;">Fecha</th>'
                + '<th style="min-width:110px;">Posicionamiento</th>'
                + reportes.map(function(r) {
                    return '<th style="min-width:110px;">' + _esc(r.nombre_reporte) + '</th>';
                }).join('')
                + '</tr>';

            // Filas
            var trHtml = rows.map(function(row) {
                var pos = row.posicionamiento;
                var posCell = _procStatusCell(pos ? pos.estado : null, pos, 'pos');
                var repCells = reportes.map(function(rep) {
                    var rd = (row.reportes || {})[String(rep.id_reporte)];
                    return _procStatusCell(rd ? rd.estado : null, rd, 'rep');
                }).join('');
                return '<tr>'
                    + '<td class="proc-fecha">' + _esc(row.fecha || '') + '</td>'
                    + posCell
                    + repCells
                    + '</tr>';
            }).join('');

            if (head) head.innerHTML = thHtml;
            if (body) body.innerHTML = trHtml;
            if (cntEl) cntEl.textContent = rows.length.toLocaleString('es-CO') + ' fechas';
            if (status) status.style.display = 'none';
            if (wrap)   wrap.style.display = 'block';
        }

        function _loadProcesamientos(forceReload) {
            var cont = _q('tab-procesamientos');
            if (!cont) return;
            if (!_procBuilt) {
                _buildProcUI(cont);
                _procBuilt = true;
            }
            if (_procData && !forceReload) {
                _renderProcTable(_procData);
                return;
            }
            var status = _q('procStatus');
            var wrap   = _q('procTableWrap');
            if (status) {
                status.style.display = '';
                status.innerHTML = '<i class="bi bi-hourglass-split" style="font-size:1.8rem;color:#0d6efd;display:block;margin-bottom:.5rem;"></i>'
                    + '<strong style="color:#475569;font-size:.82rem;">Cargando procesamientos...</strong>'
                    + '<div style="font-size:.72rem;color:#94a3b8;margin-top:.2rem;">Consultando logs de workflows.</div>';
            }
            if (wrap) wrap.style.display = 'none';

            _get(API + '/procesamientos').then(function(j) {
                if (!j.ok) {
                    if (status) {
                        status.style.display = '';
                        status.innerHTML = '<i class="bi bi-exclamation-triangle" style="font-size:1.8rem;color:#dc2626;display:block;margin-bottom:.5rem;"></i>'
                            + '<strong style="color:#475569;font-size:.82rem;">Error al cargar procesamientos</strong>';
                    }
                    return;
                }
                _procData = j.data;
                _renderProcTable(_procData);
            }).catch(function() {
                if (status) {
                    status.style.display = '';
                    status.innerHTML = '<i class="bi bi-wifi-off" style="font-size:1.8rem;color:#dc2626;display:block;margin-bottom:.5rem;"></i>'
                        + '<strong style="color:#475569;font-size:.82rem;">Error de conexión</strong>';
                }
            });
        }

        /* ══════════════════════════════════════════════════════════════════
        INICIALIZACIÓN
        ══════════════════════════════════════════════════════════════════ */
        document.addEventListener('DOMContentLoaded', function () {
            _get(API + '/meta').then(function (j) {
                if (j.ok && j.data) {
                    var fi = j.data.primer_dia_mes || '', ff = j.data.ultima_fecha || '';
                    _defaultFechaIni = fi;
                    _defaultFechaFin = ff;
                    _q('monFechaIni').value = fi;
                    _q('monFechaFin').value = ff;
                }
                _syncDateRange(false);
                _loadComponentes();
                window.monLoadRutas();
                _loadUsuarios();
                _loadAsignaciones();
            }).catch(function () {
                var today = new Date();
                _defaultFechaIni = _fmtDateInput(new Date(today.getFullYear(), today.getMonth(), 1));
                _defaultFechaFin = _defaultFechaIni;
                _q('monFechaIni').value = _defaultFechaIni;
                _q('monFechaFin').value = _defaultFechaFin;
                _syncDateRange(false);
                _loadComponentes();
                window.monLoadRutas();
                _loadUsuarios();
                _loadAsignaciones();
            });
        });

    })();
</script>
