name: Proceso ICS SNE (Blob -> PostgreSQL)

on:
  schedule:
    # 11:30 AM Bogotá (UTC-5) = 16:30 UTC
    - cron: "30 16 * * *"

  workflow_dispatch:

jobs:
  procesa_ics_sne:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      # 1️⃣ Descargar código del repo
      - name: 📦 Checkout repositorio
        uses: actions/checkout@v4

      # 2️⃣ Configurar Python
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3️⃣ Actualizar pip
      - name: ⬆️ Actualizar pip
        run: python -m pip install --upgrade pip

      # 4️⃣ Instalar dependencias
      - name: 📦 Instalar dependencias
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt --no-cache-dir
          else
            echo "❌ No existe requirements.txt"
            exit 1
          fi

      # 5️⃣ Verificar que el script exista
      - name: 🔎 Verificar script jobs/procesa_ics_sne.py
        run: |
          if [ ! -f jobs/procesa_ics_sne.py ]; then
            echo "❌ No se encontró jobs/procesa_ics_sne.py"
            exit 1
          fi

      # 6️⃣ Ejecutar script principal
      - name: 🚀 Ejecutar proceso ICS SNE
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          DATABASE_PATH: ${{ secrets.DATABASE_PATH }}
          DB_POOL_MIN: ${{ secrets.DB_POOL_MIN }}
          DB_POOL_MAX: ${{ secrets.DB_POOL_MAX }}

        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 Iniciando proceso ICS SNE"
          python --version
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          python jobs/procesa_ics_sne.py

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Proceso finalizado correctamente"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # 7️⃣ Mostrar link si falla
      - name: ❌ Mostrar link del error
        if: failure()
        run: |
          echo "El proceso falló."
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"