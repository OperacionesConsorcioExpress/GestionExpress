name: Proceso Bitacora Notas SNE (Blob -> PostgreSQL)

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  procesa_ics_sne:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: 📦 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: ⬆️ Actualizar pip
        run: python -m pip install --upgrade pip

      - name: 📦 Instalar dependencias
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt --no-cache-dir
          else
            echo "❌ No existe requirements.txt"
            exit 1
          fi

      - name: 🔎 Verificar script jobs/procesa_ics_sne.py
        run: |
          if [ ! -f jobs/procesa_bitacoranotas_sne.py ]; then
            echo "❌ No se encontró jobs/procesa_bitacoranotas_sne.py"
            echo "📁 Contenido del repo:"
            ls -la
            echo "📁 Contenido de jobs/:"
            ls -la jobs || true
            exit 1
          fi

      - name: 🚀 Ejecutar proceso ICS SNE
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          DATABASE_PATH: ${{ secrets.DATABASE_PATH_DEDICATED }}
          DB_POOL_MIN: ${{ secrets.DB_POOL_MIN }}
          DB_POOL_MAX: ${{ secrets.DB_POOL_MAX }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 Iniciando proceso ICS SNE"
          python --version
          echo "📁 Working dir: $(pwd)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          python -m jobs.procesa_ics_sne

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Proceso finalizado correctamente"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ❌ Mostrar link del error
        if: failure()
        run: |
          echo "El proceso falló."
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
