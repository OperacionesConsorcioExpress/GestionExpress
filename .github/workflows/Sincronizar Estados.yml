name: Sincronizar Estados

on:
  schedule:
    - cron: '0 8 * * *' # 3:00 AM Bogotá (8:00 AM UTC)
  workflow_dispatch: # Habilita la ejecución manual

jobs:
  sincronizar-estados:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Verificar conexión a la base de datos
      env:
        DATABASE_PATH_DEDICATED: ${{ secrets.DATABASE_PATH_DEDICATED }}
      run: |
        python -c "
        import os
        import psycopg2
        try:
            conn = psycopg2.connect(os.environ['DATABASE_PATH_DEDICATED'])
            print('Conexión a la base de datos exitosa')
            conn.close()
        except Exception as e:
            print(f'Error al conectar a la base de datos: {e}')
            raise e
        "
    - name: Sincronizar estados
      env:
        DATABASE_PATH_DEDICATED: ${{ secrets.DATABASE_PATH_DEDICATED }}
        USUARIO_CORREO_JURIDICO: ${{ secrets.USUARIO_CORREO_JURIDICO }}
        CLAVE_CORREO_JURIDICO: ${{ secrets.CLAVE_CORREO_JURIDICO }}
      run: |
        python -c "from jobs.job_juridico import TareasProgramadasJuridico; TareasProgramadasJuridico().sincronizar_estados_filas_gestion()"
