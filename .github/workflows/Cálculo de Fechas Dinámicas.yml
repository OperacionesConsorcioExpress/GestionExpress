name: Cálculo de Fechas Dinámicas

on:
  schedule:
    - cron: '0 7 * * *' # 2:00 AM Bogotá (7:00 AM UTC)
  workflow_dispatch: # Habilita la ejecución manual

jobs:
  calcular-fechas:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Verificar conexión a la base de datos
      env:
        DATABASE_PATH_DEDICATED: ${{ secrets.DATABASE_PATH_DEDICATED }}
      run: |
        python -c "
        import os
        import psycopg2
        try:
            conn = psycopg2.connect(os.environ['DATABASE_PATH_DEDICATED'])
            print('Conexión a la base de datos exitosa')
            conn.close()
        except Exception as e:
            print(f'Error al conectar a la base de datos: {e}')
            raise e
        "
    - name: Ejecutar cálculo de fechas dinámicas
      env:
        DATABASE_PATH_DEDICATED: ${{ secrets.DATABASE_PATH_DEDICATED }}
      run: |
        python -c "from jobs.job_juridico import TareasProgramadasJuridico; TareasProgramadasJuridico().calcular_y_actualizar_fechas_dinamicas()"
