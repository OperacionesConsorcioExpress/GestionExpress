name: Sincronizar Objeciones Vencidas SNE

on:
  schedule:
    - cron: "5 5 * * *" # 12:05 AM Bogota (05:05 AM UTC)
  workflow_dispatch:

jobs:
  sincronizar-objeciones-vencidas-sne:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt --no-cache-dir
          else
            echo "No existe requirements.txt"
            exit 1
          fi

      - name: Verificar conexion a la base de datos
        env:
          DATABASE_PATH_DEDICATED: ${{ secrets.DATABASE_PATH_DEDICATED }}
        run: |
          python -c "
          import os
          import psycopg2
          try:
              conn = psycopg2.connect(os.environ['DATABASE_PATH_DEDICATED'])
              print('Conexion a la base de datos exitosa')
              conn.close()
          except Exception as e:
              print(f'Error al conectar a la base de datos: {e}')
              raise e
          "

      - name: Ejecutar sincronizacion de objeciones vencidas SNE
        env:
          DATABASE_PATH_DEDICATED: ${{ secrets.DATABASE_PATH_DEDICATED }}
        run: |
          python -c "from jobs.job_sne_objecion import TareasProgramadasSneObjecion; TareasProgramadasSneObjecion().sincronizar_objeciones_vencidas()"

      - name: Mostrar link del error
        if: failure()
        run: echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
