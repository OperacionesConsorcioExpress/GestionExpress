name: Proceso Acciones Regulacion SNE (Azure -> PostgreSQL)

on:
  schedule:
    - cron: "30 17 * * *"
  workflow_dispatch:

jobs:
  procesa_acciones_regulacion_sne:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt --no-cache-dir
          else
            echo "No existe requirements.txt"
            exit 1
          fi

      - name: Verificar script jobs/procesa_acciones_regulacion_sne.py
        run: |
          if [ ! -f "jobs/procesa_acciones_regulacion_sne.py" ]; then
            echo "No se encontro jobs/procesa_acciones_regulacion_sne.py"
            ls -la
            ls -la jobs || true
            exit 1
          fi

      - name: Ejecutar proceso Acciones Regulacion SNE
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          DATABASE_PATH: ${{ secrets.DATABASE_PATH }}
          DB_POOL_MIN: ${{ secrets.DB_POOL_MIN }}
          DB_POOL_MAX: ${{ secrets.DB_POOL_MAX }}
        run: |
          python --version
          python "jobs/procesa_acciones_regulacion_sne.py"

      - name: Mostrar link del error
        if: failure()
        run: echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
