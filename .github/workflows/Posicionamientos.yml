name: Proceso Posicionamientos (Blob -> PostgreSQL)

on:
  schedule:
    # 9:00 AM Bogotá (UTC-5) = 14:00 UTC
    - cron: "0 14 * * *"
  
  # Permite ejecución manual desde GitHub UI
  workflow_dispatch:
    inputs:
      dias_procesar:
        description: 'Días pendientes a procesar'
        required: false
        default: '2'
        type: string
      modo_verbose:
        description: 'Modo verbose (0=no, 1=sí)'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

jobs:
  posicionamientos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    # Permisos necesarios
    permissions:
      contents: read
    
    steps:
      # ==========================================
      # 1. CHECKOUT DEL REPOSITORIO
      # ==========================================
      - name: 📦 Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Solo último commit (más rápido)
      
      # ==========================================
      # 2. CONFIGURAR PYTHON 3.12 (CRÍTICO)
      # ==========================================
      - name: 🐍 Setup Python 3.12.4
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"
          cache: 'pip'  # ⚡ Cache de dependencias
      
      # ==========================================
      # 3. VERIFICAR VERSIÓN DE PYTHON
      # ==========================================
      - name: 🔍 Verificar Python
        run: |
          python --version
          python -c "import sys; print(f'Python {sys.version}')"
          if [[ "$(python -c 'import sys; print(sys.version_info[:2])')" != "(3, 12)" ]]; then
            echo "❌ ERROR: Se requiere Python 3.12"
            exit 1
          fi
          echo "✅ Python 3.12 confirmado"
      
      # ==========================================
      # 4. ACTUALIZAR PIP
      # ==========================================
      - name: ⬆️ Actualizar pip
        run: |
          python -m pip install --upgrade pip
          pip --version
      
      # ==========================================
      # 5. INSTALAR DEPENDENCIAS CRÍTICAS PRIMERO
      # ==========================================
      - name: 📦 Instalar dependencias críticas
        run: |
          echo "📦 Instalando dependencias críticas para posicionamientos..."
          
          # Instalar en orden específico para evitar conflictos
          pip install numpy==2.0.2
          pip install pyarrow==21.0.0
          pip install polars==1.32.3
          pip install psycopg2-binary==2.9.10
          pip install azure-storage-blob==12.28.0
          
          echo "✅ Dependencias críticas instaladas"
      
      # ==========================================
      # 6. INSTALAR RESTO DE DEPENDENCIAS
      # ==========================================
      - name: 📚 Instalar requirements.txt
        run: |
          echo "📦 Instalando resto de dependencias..."
          echo ""
          
          # Usar script Python para procesar requirements.txt con cualquier encoding
          python3 << 'PYTHON_SCRIPT'
          import sys
          
          def detectar_y_convertir_encoding():
              """Detecta el encoding y convierte a UTF-8 si es necesario."""
              encodings_a_probar = [
                  'utf-8',
                  'utf-16',
                  'utf-16-le',
                  'utf-16-be',
                  'latin-1',
                  'cp1252',
                  'iso-8859-1',
              ]
              
              for encoding in encodings_a_probar:
                  try:
                      with open('requirements.txt', 'r', encoding=encoding) as f:
                          contenido = f.read()
                      print(f"✅ Detectado encoding: {encoding}")
                      return contenido
                  except (UnicodeDecodeError, LookupError):
                      continue
              
              print("⚠️  Usando fallback UTF-16LE con errors='replace'")
              with open('requirements.txt', 'rb') as f:
                  raw = f.read()
              return raw.decode('utf-16-le', errors='replace')
          
          def limpiar_linea(linea: str) -> str:
              """Limpia una línea de caracteres especiales y espacios."""
              linea = ''.join(char for char in linea if ord(char) >= 32 or char in '\n\t\r')
              return linea.strip()
          
          def extraer_nombre_paquete(linea: str) -> str:
              """Extrae el nombre del paquete de una línea de requirement."""
              for sep in ['==', '>=', '<=', '!=', '<', '>', '[']:
                  if sep in linea:
                      linea = linea.split(sep)[0]
              return linea.strip().lower()
          
          # Paquetes ya instalados
          instalados = {
              'numpy', 'pyarrow', 'polars', 
              'psycopg2-binary', 'psycopg2',
              'azure-storage-blob'
          }
          
          try:
              # 1. Detectar y convertir encoding
              print("🔍 Detectando encoding de requirements.txt...")
              contenido = detectar_y_convertir_encoding()
              
              # 2. Convertir el archivo a UTF-8
              print("📝 Convirtiendo requirements.txt a UTF-8...")
              with open('requirements.txt', 'w', encoding='utf-8') as f:
                  f.write(contenido)
              print("✅ requirements.txt convertido a UTF-8")
              
              # 3. Leer línea por línea y filtrar
              print("🔄 Filtrando dependencias duplicadas...")
              with open('requirements.txt', 'r', encoding='utf-8') as f:
                  lineas = f.readlines()
              
              lineas_filtradas = []
              lineas_descartadas = []
              
              for i, linea in enumerate(lineas, 1):
                  linea_limpia = limpiar_linea(linea)
                  
                  if not linea_limpia or linea_limpia.startswith('#'):
                      if linea_limpia.startswith('#'):
                          lineas_filtradas.append(linea_limpia)
                      continue
                  
                  pkg_name = extraer_nombre_paquete(linea_limpia)
                  
                  if pkg_name in instalados:
                      lineas_descartadas.append(f"  ⊘ {linea_limpia}")
                      continue
                  
                  lineas_filtradas.append(linea_limpia)
              
              # 4. Escribir archivo temporal
              print(f"📝 Escribiendo requirements_temp.txt...")
              with open('requirements_temp.txt', 'w', encoding='utf-8') as out:
                  for linea in lineas_filtradas:
                      if linea.strip() and not linea.startswith('#'):
                          out.write(linea + '\n')
              
              # 5. Resumen
              count_temp = len([l for l in lineas_filtradas if l.strip() and not l.startswith('#')])
              count_descartadas = len(lineas_descartadas)
              
              print(f"\n📊 Resumen:")
              print(f"  Total de líneas: {len(lineas)}")
              print(f"  Paquetes a instalar: {count_temp}")
              print(f"  Paquetes descartados: {count_descartadas}")
              
              if lineas_descartadas and count_descartadas <= 10:
                  print(f"\n🔕 Paquetes descartados:")
                  for desc in lineas_descartadas:
                      print(desc)
              
              print(f"\n✅ requirements_temp.txt generado correctamente")
              
          except Exception as e:
              print(f"❌ Error: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          
          PYTHON_SCRIPT
          
          echo ""
          
          # Instalar paquetes del archivo temporal
          if [ -f requirements_temp.txt ]; then
              num_lineas=$(wc -l < requirements_temp.txt)
              if [ "$num_lineas" -gt 0 ]; then
                  echo "📦 Instalando ${num_lineas} paquetes adicionales..."
                  pip install -r requirements_temp.txt --no-cache-dir
                  echo "✅ Paquetes instalados exitosamente"
              else
                  echo "ℹ️  No hay paquetes adicionales para instalar"
              fi
          else
              echo "❌ Error: requirements_temp.txt no se generó"
              exit 1
          fi
      
      # ==========================================
      # 7. VERIFICAR INSTALACIÓN
      # ==========================================
      - name: 🔍 Verificar paquetes críticos
        run: |
          echo "🔍 Verificando paquetes instalados..."
          
          python -c "import polars as pl; print(f'✅ Polars: {pl.__version__}')"
          python -c "import pyarrow as pa; print(f'✅ PyArrow: {pa.__version__}')"
          python -c "import pandas as pd; print(f'✅ Pandas: {pd.__version__}')"
          python -c "import numpy as np; print(f'✅ NumPy: {np.__version__}')"
          python -c "import psycopg2; print(f'✅ psycopg2: {psycopg2.__version__}')"
          python -c "from azure.storage.blob import BlobServiceClient; print('✅ Azure Blob Storage')"
          
          echo ""
          echo "📦 Paquetes instalados (resumen):"
          pip list | grep -E "(polars|pyarrow|pandas|numpy|psycopg2|azure)" || echo "No hay coincidencias"
      
      # ==========================================
      # 8. EJECUTAR PROCESO POSICIONAMIENTOS
      # ==========================================
      - name: 🚀 Ejecutar job posicionamientos
        env:
          # Credenciales desde GitHub Secrets
          DATABASE_PATH: ${{ secrets.DATABASE_PATH_DEDICATED }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          
          # Parámetros configurables
          POS_LIMITE_DIAS: ${{ github.event.inputs.dias_procesar || '2' }}
          POS_VERBOSE: ${{ github.event.inputs.modo_verbose || '0' }}
          
          # Información del workflow
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 Iniciando proceso de posicionamientos"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📅 Días a procesar: ${POS_LIMITE_DIAS}"
          echo "🔊 Modo verbose: ${POS_VERBOSE}"
          echo "👤 Ejecutado por: ${GITHUB_ACTOR}"
          echo "🐍 Python: $(python --version)"
          echo "📦 Polars: $(python -c 'import polars; print(polars.__version__)')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Ejecutar como módulo importable
          python -c "
          import os
          from jobs.posicionamientos import ejecutar_job_posicionamientos
          
          # Obtener parámetros desde variables de entorno
          limite_dias = int(os.getenv('POS_LIMITE_DIAS', '2'))
          modo_verbose = os.getenv('POS_VERBOSE', '0') == '1'
          
          print(f'✅ Módulo importado correctamente')
          print(f'   Días a procesar: {limite_dias}')
          print(f'   Modo verbose: {modo_verbose}')
          print()
          
          # Ejecutar la función
          ejecutar_job_posicionamientos(limite_dias_por_ejecucion=limite_dias, verbose=modo_verbose)
          "
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Proceso completado exitosamente"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      
      # ==========================================
      # 9. NOTIFICACIÓN EN CASO DE ERROR
      # ==========================================
      - name: 📧 Notificar error
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ ERROR: El proceso de posicionamientos falló"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔗 Ver detalles en:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      
      # ==========================================
      # 10. GUARDAR LOGS (OPCIONAL)
      # ==========================================
      - name: 💾 Guardar logs de ejecución
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-posicionamientos-${{ github.run_number }}
          path: |
            *.log
            logs/*.log
          retention-days: 7
          if-no-files-found: ignore
      
      # ==========================================
      # 11. RESUMEN DE EJECUCIÓN
      # ==========================================
      - name: 📊 Resumen de ejecución
        if: success()
        run: |
          echo "### ✅ Ejecución Exitosa - Posicionamientos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuración:**" >> $GITHUB_STEP_SUMMARY
          echo "- 🐍 Python: $(python --version)" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Polars: $(python -c 'import polars; print(polars.__version__)')" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 PyArrow: $(python -c 'import pyarrow; print(pyarrow.__version__)')" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Días procesados: ${POS_LIMITE_DIAS}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔊 Modo verbose: ${POS_VERBOSE}" >> $GITHUB_STEP_SUMMARY
          echo "- 👤 Ejecutado por: ${GITHUB_ACTOR}" >> $GITHUB_STEP_SUMMARY
          echo "- 🕐 Fecha: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
